<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Gen I - Pikachu</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for Typography -->
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body>

    <div class="landing-page">
        <!-- Background Pokeball Icon -->
        <div class="bg-pokeball"></div>

        <!-- Header: Logo and Menu -->
        <header>
            <img src="https://wikimedia.org" alt="Pokemon Logo" class="logo">
            <div class="menu-icon">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </header>

        <!-- Main Content Section -->
        <main class="content">
            <div class="text-side">
                <p class="gen-tag">POKEMON GEN I</p>
                <h1 class="main-title">Pikachu</h1>
                <p class="description">
                    Pikachu is an Electric-type Pokémon introduced in Generation I. 
                    Pikachu are small, chubby, and incredibly cute mouse-like Pokémon. 
                    They are almost completely covered by yellow fur.
                </p>
                <div class="pagination">01 / 08</div>
            </div>

            <div class="image-side">
                <img src="https://pokemon.com" alt="Pikachu" class="pikachu-img">
            </div>
        </main>

        <!-- Vertical Navigation Dots -->
        <div class="side-dots">
            <span class="dot active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
    </div>

</body>
</html>
